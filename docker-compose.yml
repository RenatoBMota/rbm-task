version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rbm_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rbmtask}
      POSTGRES_USER: ${POSTGRES_USER:-rbm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rbmpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rbm_internal

  redis:
    image: redis:7-alpine
    container_name: rbm_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rbmredis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rbm_internal

  minio:
    image: minio/minio:latest
    container_name: rbm_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rbmadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rbmminiopass}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - rbm_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rbm_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rbm}:${POSTGRES_PASSWORD:-rbmpassword}@postgres:5432/${POSTGRES_DB:-rbmtask}
      REDIS_URL: redis://:${REDIS_PASSWORD:-rbmredis}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production-use-openssl-rand-hex-32}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-rbmadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-rbmminiopass}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: '["https://task.renatomota.online"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rbm_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rbm_frontend
    environment:
      NEXT_PUBLIC_API_URL: https://task.renatomota.online
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rbm_internal

  nginx:
    image: nginx:alpine
    container_name: rbm_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - rbm_internal
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      # HTTPS
      - "traefik.http.routers.rbm-task.rule=Host(`task.renatomota.online`)"
      - "traefik.http.routers.rbm-task.entrypoints=websecure"
      - "traefik.http.routers.rbm-task.tls=true"
      - "traefik.http.routers.rbm-task.tls.certresolver=mytlschallenge"
      - "traefik.http.services.rbm-task.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.rbm-task-http.rule=Host(`task.renatomota.online`)"
      - "traefik.http.routers.rbm-task-http.entrypoints=web"
      - "traefik.http.routers.rbm-task-http.middlewares=rbm-https-redirect"
      - "traefik.http.middlewares.rbm-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.rbm-https-redirect.redirectscheme.permanent=true"

networks:
  rbm_internal:
    driver: bridge
  n8n_default:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
