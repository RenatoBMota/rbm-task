version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rbm_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rbmtask}
      POSTGRES_USER: ${POSTGRES_USER:-rbm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rbmpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rbm_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rbmredis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rbm_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rbmadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rbmminiopass}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rbm_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rbm}:${POSTGRES_PASSWORD:-rbmpassword}@postgres:5432/${POSTGRES_DB:-rbmtask}
      REDIS_URL: redis://:${REDIS_PASSWORD:-rbmredis}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production-use-openssl-rand-hex-32}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-rbmadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-rbmminiopass}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rbm_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: rbm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_certs:
